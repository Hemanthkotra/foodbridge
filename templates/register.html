{% extends "base.html" %}
{% block title %}Register — FoodBridge{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="bg-white rounded-2xl shadow-lg border border-gray-100 w-full max-w-md p-8 fade-in">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Create your account</h1>
      <p class="text-gray-500 text-sm mt-1">Join FoodBridge today</p>
    </div>

    <div id="msg" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center"></div>

    <form id="registerForm" class="space-y-4">
      <!-- Role toggle -->
      <div class="grid grid-cols-2 gap-2 bg-gray-100 p-1 rounded-xl">
        <button type="button" id="btn-restaurant" onclick="setRole('restaurant')"
          class="py-2 rounded-lg text-sm font-medium transition-all bg-white shadow text-brand-700">
          🍽 Restaurant
        </button>
        <button type="button" id="btn-orphanage" onclick="setRole('orphanage')"
          class="py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700">
          🏠 Orphanage
        </button>
      </div>
      <input type="hidden" id="role" value="restaurant"/>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Organisation name</label>
        <input id="name" type="text" placeholder="e.g. Green Leaf Restaurant"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input id="email" type="email" placeholder="you@example.com"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
        <input id="address" type="text" placeholder="Street, City"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone number</label>
        <input id="phone" type="text" placeholder="+91 98765 43210"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"/>
      </div>

      <button type="submit"
        class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm mt-2">
        Create account
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">
      Already registered? <a href="/login-page" class="text-brand-600 font-medium hover:underline">Log in</a>
    </p>
  </div>
</div>

<script>
function setRole(role) {
  document.getElementById('role').value = role;
  const r = document.getElementById('btn-restaurant');
  const o = document.getElementById('btn-orphanage');
  if (role === 'restaurant') {
    r.className = 'py-2 rounded-lg text-sm font-medium transition-all bg-white shadow text-brand-700';
    o.className = 'py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
  } else {
    o.className = 'py-2 rounded-lg text-sm font-medium transition-all bg-white shadow text-brand-700';
    r.className = 'py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
  }
}

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const res = await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name:     document.getElementById('name').value,
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value,
      role:     document.getElementById('role').value,
      address:  document.getElementById('address').value,
      phone:    document.getElementById('phone').value
    })
  });
  const data = await res.json();
  msg.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-700');
  if (res.ok) {
    msg.classList.add('bg-green-50', 'text-green-700');
    msg.textContent = 'Account created! Redirecting to login…';
    setTimeout(() => window.location.href = '/login-page', 1500);
  } else {
    msg.classList.add('bg-red-50', 'text-red-600');
    msg.textContent = data.error;
  }
  msg.classList.remove('hidden');
});
</script>
{% endblock %}
