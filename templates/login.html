{% extends "base.html" %}
{% block title %}Log in — FoodBridge{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="bg-white rounded-2xl shadow-lg border border-gray-100 w-full max-w-md p-8 fade-in">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
      <p class="text-gray-500 text-sm mt-1">Log in to your FoodBridge account</p>
    </div>

    <div id="msg" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center"></div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input id="email" type="email" placeholder="you@example.com"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 transition-all"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 transition-all"/>
      </div>
      <button type="submit"
        class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm mt-2">
        Log in
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">
      No account? <a href="/register-page" class="text-brand-600 font-medium hover:underline">Register free</a>
    </p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  msg.classList.remove('hidden','bg-red-50','text-red-600','bg-green-50','text-green-700');
  if (res.ok) {
    msg.classList.add('bg-green-50','text-green-700');
    msg.textContent = data.message + ' Redirecting…';
    setTimeout(() => {
      window.location.href = data.role === 'restaurant'
        ? '/dashboard/restaurant'
        : '/dashboard/orphanage';
    }, 1000);
  } else {
    msg.classList.add('bg-red-50','text-red-600');
    msg.textContent = data.error;
  }
  msg.classList.remove('hidden');
});
</script>
{% endblock %}
